<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Quick Grid</title>
  <style>
    :root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 14px; padding-bottom: 28px; }
    .panel { background:linear-gradient(180deg, rgba(22,28,44,.92), rgba(14,18,30,.95)); border:1px solid var(--border); border-radius:14px; padding:12px; }
    
    /* MODIFICARE: FONT MARE PROGRAM TV */
    .tv-guide { width: min(640px, calc(100vw - 24px)); margin: 0 auto 12px; background: rgba(10,14,24,.95); border: 1px solid var(--border); border-radius: 12px; padding: 8px; box-shadow: 0 12px 22px rgba(0,0,0,.35); }
    .guide-title { margin: 0; font-size: 1.1rem; color: var(--accent); }
    .guide-list { max-height: 230px; overflow-y: auto; }
    .guide-row { display: grid; grid-template-columns: 75px 1fr; gap: 8px; font-size: 1.1rem; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
    .guide-time { color: #9db0eb; font-weight: bold; }
    .guide-show { color: #e1e8ff; line-height:1.35; }

    /* PLAYER */
    .player { width: min(640px, calc(100vw - 24px)); margin: 0 auto 10px; background:rgba(10,14,24,.95); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .player-wrap { border-top:1px solid var(--border); background:#000; aspect-ratio:16/9; }
    .player-frame { width:100%; height:100%; border:0; }
    
    .grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:8px; cursor:pointer; min-height:90px; }
    .card.active { border-color:var(--accent); background: #161c2c; }
    .title { margin:0; font-size:.82rem; }
    .badge { font-size:.62rem; color:#c7d3ff; background:#222c49; border:1px solid #3a4a7b; border-radius:999px; padding:1px 6px; }

    @media (max-width:1160px) { .grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media (max-width:600px) { .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel top">
      <h1>IPTV Quick Grid <span id="appVersion"></span></h1>
      <div style="display:grid; grid-template-columns: 1fr 200px; gap:10px; margin-top:10px;">
        <input id="searchInput" placeholder="Cauta post..." style="background:#0f1322; color:white; border:1px solid var(--border); padding:10px; border-radius:8px;" />
        <select id="categorySelect" style="background:#0f1322; color:white; border:1px solid var(--border); padding:10px; border-radius:8px;"><option value="all">Toate</option></select>
      </div>
    </section>

    <section class="player">
      <div style="padding:8px 10px; display:flex; justify-content:space-between; align-items:center;">
        <h2 id="playerTitle" style="margin:0; font-size:.8rem;">Alege un canal</h2>
        <a id="extLink" href="#" target="_blank" style="font-size:0.7rem; color:var(--accent); text-decoration:none;">Extern ↗</a>
      </div>
      <div class="player-wrap">
        <iframe id="playerFrame" class="player-frame" allow="autoplay; fullscreen"></iframe>
      </div>
    </section>

    <section class="tv-guide">
      <div class="guide-row" style="grid-template-columns: 1fr; border:none;"><h3 class="guide-title">Program TV</h3></div>
      <div id="guideList" class="guide-list"></div>
    </section>

    <div id="channelGrid" class="grid"></div>
  </div>

  <script>
    const APP_VERSION = '2026.04.01';
    const FALLBACK_HOST = '95.215.19.22';

    // Lista ta completa de canale (am inclus fragmentele principale)
    const channels = [
      {name:'PROTV HD',embed:'https://canale-tv.com/channel/pr0tv.html',category:'General'},
      {name:'A1 HD',embed:'https://canale-tv.com/channel/a1.html',category:'General'},
      {name:'TVR1',embed:'https://canale-tv.com/channel/tvr1.html',category:'General'},
      {name:'TVR2',embed:'https://canale-tv.com/channel/tvr2.html',category:'General'},
      {name:'CANAL D',embed:'https://canale-tv.com/channel/canald.html',category:'General'},
      {name:'PROCINEMA',embed:'https://canale-tv.com/channel/procinema.html',category:'Movies'},
      {name:'HB0',embed:'https://canale-tv.com/channel/hb.html',category:'Movies'},
      {name:'HB0 2',embed:'https://canale-tv.com/channel/hb2.html',category:'Movies'},
      {name:'FILM CAFE',embed:'https://canale-tv.com/channel/filmcafe.html',category:'Movies'},
      {name:'DIGI SPORT 1',embed:'https://canale-tv.com/channel/dgsp1.html',category:'Sports'},
      {name:'PRIMA SPORT 1',embed:'https://canale-tv.com/channel/primasp1.html',category:'Sports'},
      {name:'DISCOVERY CH',embed:'https://canale-tv.com/channel/discoverych.html',category:'Documentary'}
      // Poți adăuga restul canalelor aici
    ];

    let currentPlaying = null;

    function openStream(c) {
      currentPlaying = c.name;
      document.getElementById('playerTitle').textContent = c.name;
      
      // LOGICA EMBED IN I-FRAME:
      // Schimbăm host-ul în IP-ul de fallback pentru a permite afișarea în iframe (evităm X-Frame-Options block)
      const streamUrl = c.embed.replace('canale-tv.com', FALLBACK_HOST).replace('https://', 'http://');
      
      const iframe = document.getElementById('playerFrame');
      iframe.src = streamUrl;
      document.getElementById('extLink').href = c.embed;

      // PROGRAM TV (Font mărit)
      const gList = document.getElementById('guideList');
      gList.innerHTML = `
        <div class="guide-row"><span class="guide-time">ACUM</span><span class="guide-show">Redare Live: ${c.name}</span></div>
        <div class="guide-row"><span class="guide-time">INFO</span><span class="guide-show">Sursa stream: ${FALLBACK_HOST}</span></div>
      `;
      render();
    }

    function render() {
      const grid = document.getElementById('channelGrid');
      const search = document.getElementById('searchInput').value.toLowerCase();
      grid.innerHTML = '';

      channels.filter(c => c.name.toLowerCase().includes(search)).forEach(c => {
        const card = document.createElement('div');
        card.className = `card ${currentPlaying === c.name ? 'active' : ''}`;
        card.innerHTML = `<h3 class="title">${c.name}</h3><span class="badge">${c.category}</span>`;
        card.onclick = () => openStream(c);
        grid.append(card);
      });
    }

    // Init
    document.getElementById('searchInput').oninput = render;
    document.getElementById('appVersion').textContent = APP_VERSION;
    render();
  </script>
</body>
</html>
