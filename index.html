
<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Quick Grid - Preview Fix</title>
  <style>
    :root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 14px; }
    .panel { background:linear-gradient(180deg, rgba(22,28,44,.92), rgba(14,18,30,.95)); border:1px solid var(--border); border-radius:14px; padding:12px; margin-bottom: 12px; }
    
    /* PLAYER PREVIEW */
    .player { width: min(800px, calc(100vw - 24px)); margin: 0 auto 15px; background:#000; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .player-head { padding: 10px; display: flex; justify-content: space-between; background: #161c2c; }
    .player-wrap { aspect-ratio: 16/9; background: #000; position: relative; }
    iframe { width: 100%; height: 100%; border: none; }

    /* PROGRAM TV (FONT MARIT) */
    .tv-guide { width: min(800px, calc(100vw - 24px)); margin: 0 auto 20px; background: rgba(10,14,24,.95); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
    .guide-row { display: grid; grid-template-columns: 100px 1fr; gap: 15px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .guide-time { color: var(--accent); font-size: 1.15rem; font-weight: bold; }
    .guide-show { color: #fff; font-size: 1.15rem; line-height: 1.4; }

    /* GRID CANALE */
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:10px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:15px; cursor:pointer; text-align: center;}
    .card.active { border-color: var(--accent); background: #1a2238; }
    .title { font-size: 1rem; font-weight: bold; }
    
    input { width: 100%; padding: 12px; border-radius: 8px; background: #0f1322; color: white; border: 1px solid var(--border); margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>IPTV Preview Mode</h1>
      <input id="searchInput" placeholder="Caută canal..." />
    </section>

    <section class="player">
      <div class="player-head"><span id="pTitle">Selectează un canal</span></div>
      <div class="player-wrap">
        <iframe id="pFrame" allow="autoplay; fullscreen"></iframe>
      </div>
    </section>

    <section class="tv-guide">
      <div style="font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px;">📺 Program TV</div>
      <div id="gList">
        <div style="padding: 20px; color: var(--muted); text-align: center;">Alege un post pentru program...</div>
      </div>
    </section>

    <div id="cGrid" class="grid"></div>
  </div>

  <script>
    const FALLBACK_IP = '95.215.19.22';

    // LISTA TA DE CANALE (Completează cu restul canalelor tale aici)
    const channels = [
      {name:'PROTV HD',embed:'https://canale-tv.com/channel/pr0tv.html',category:'General'},
      {name:'A1 HD',embed:'https://canale-tv.com/channel/a1.html',category:'General'},
      {name:'DIGI SPORT 1',embed:'https://canale-tv.com/channel/dgsp1.html',category:'Sports'},
      {name:'HB0',embed:'https://canale-tv.com/channel/hb.html',category:'Movies'},
      {name:'FILM CAFE',embed:'https://canale-tv.com/channel/filmcafe.html',category:'Movies'}
    ];

    let activeChannel = null;

    function playStream(c) {
      activeChannel = c.name;
      document.getElementById('pTitle').textContent = `Redare: ${c.name}`;
      
      // ACESTA ESTE FIX-UL PENTRU IFRAME:
      // Înlocuim domeniul cu IP-ul serverului de stream pentru a permite embed
      let streamUrl = c.embed.replace('https://canale-tv.com', 'http://' + FALLBACK_IP);
      
      document.getElementById('pFrame').src = streamUrl;

      // UPDATE PROGRAM TV (FONT MARE)
      document.getElementById('gList').innerHTML = `
        <div class="guide-row"><div class="guide-time">ACUM</div><div class="guide-show">Program live pe ${c.name}</div></div>
        <div class="guide-row"><div class="guide-time">18:00</div><div class="guide-show">Știri și divertisment</div></div>
        <div class="guide-row"><div class="guide-time">20:30</div><div class="guide-show">Film de seară</div></div>
      `;
      render();
    }

    function render() {
      const grid = document.getElementById('cGrid');
      const search = document.getElementById('searchInput').value.toLowerCase();
      grid.innerHTML = '';

      channels.filter(c => c.name.toLowerCase().includes(search)).forEach(c => {
        const card = document.createElement('div');
        card.className = `card ${activeChannel === c.name ? 'active' : ''}`;
        card.innerHTML = `<div class="title">${c.name}</div><div style="font-size:0.7rem; color:var(--muted)">${c.category}</div>`;
        card.onclick = () => playStream(c);
        grid.append(card);
      });
    }

    document.getElementById('searchInput').oninput = render;
    render();
  </script>
</body>
</html>
