<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Preview</title>
  <style>
    :root{--bg:#0b1020;--panel:#131a2d;--border:#2a365a;--text:#ecf1ff;--muted:#9fb0df;--acc:#6f8cff}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#121938,#0b1020);color:var(--text);font-family:Arial,sans-serif}
    .wrap{max-width:1100px;margin:0 auto;padding:14px}
    .panel{background:var(--panel);border:1px solid var(--border);padding:12px}
    .top{display:grid;gap:10px;margin-bottom:12px}
    .quick-nav{display:flex;gap:8px;flex-wrap:wrap}
    button{
      border:1px solid var(--border);
      border-radius:0;           /* patrate */
      background:#1a2340;
      color:var(--text);
      min-height:40px;
      padding:0 14px;
      cursor:pointer;
      font-weight:700;
    }
    .controls{display:grid;grid-template-columns:1fr 200px auto;gap:8px}
    input,select{width:100%;min-height:40px;border:1px solid var(--border);border-radius:0;background:#0f1630;color:var(--text);padding:0 10px}

    .player{background:#000;border:1px solid var(--border)}
    .player-head{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#121a33}
    .player-tools{display:flex;gap:8px;align-items:center}
    .player-wrap{aspect-ratio:16/9}
    iframe{width:100%;height:100%;border:0;background:#000}

    .guide{margin-top:12px;background:var(--panel);border:1px solid var(--border);padding:10px}
    .guide h3{margin:0 0 8px;font-size:1.25rem}
    .guide-list{max-height:260px;overflow:auto}
    .row{
      display:grid;
      grid-template-columns:90px 1fr;
      gap:10px;
      margin-bottom:10px;
      font-size:1.08rem;         /* text mare */
      line-height:1.4;
    }
    .time{color:#9fc0ff;font-weight:700}
    .show{color:#f3f6ff}

    .grid{margin-top:12px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .card{background:var(--panel);border:1px solid var(--border);padding:10px}
    .title{font-weight:700;margin-bottom:8px}
    .open{width:100%}

    @media (max-width:800px){.controls{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}}
    @media (max-width:500px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel top">
      <h1 style="margin:0">IPTV Quick Grid</h1>

      <div class="quick-nav">
        <button id="goToStream" type="button">▶ Stream</button>
        <button id="goToProgram" type="button">📺 Program</button>
      </div>

      <div class="controls">
        <input id="searchInput" placeholder="Caută post..." />
        <select id="categorySelect"><option value="all">Toate</option></select>
        <button id="showFavorites" type="button">★ Favorite</button>
      </div>
    </section>

    <section id="playerPanel" class="player">
      <div class="player-head">
        <div id="playerTitle">Selectează un canal</div>
        <div class="player-tools">
          <small id="playerMeta" style="color:var(--muted)">Preview live</small>
          <button id="fullscreenBtn" type="button">⛶ Fullscreen</button>
        </div>
      </div>
      <div class="player-wrap" id="playerWrap">
        <iframe id="playerFrame" title="Preview" allow="autoplay; fullscreen"></iframe>
      </div>
    </section>

    <section id="tvGuide" class="guide">
      <h3>Program TV</h3>
      <div class="guide-list" id="guideList"></div>
    </section>

    <section class="grid" id="channelGrid"></section>
  </div>

  <script>
    const channels = [
      {name:'PROTV HD', category:'General', embed:'https://canale-tv.com/channel/pr0tv.html'},
      {name:'A1 HD', category:'General', embed:'https://canale-tv.com/channel/a1.html'},
      {name:'DIGI SPORT 1', category:'Sports', embed:'https://canale-tv.com/channel/dgsp1.html'},
      {name:'BBC NEWS', category:'News', embed:'https://canale-tv.com/channel/bbcnews.html'},
      {name:'FILM CAFE', category:'Movies', embed:'https://canale-tv.com/channel/filmcafe.html'}
    ];

    const program = {
      'PROTV HD': ['08:00 Știri', '09:00 Magazin', '10:00 Film'],
      'A1 HD': ['08:00 Observator', '09:00 Emisiune', '10:00 Serial'],
      'DIGI SPORT 1': ['08:00 Studio Sport', '09:00 Fotbal Live', '11:00 Tenis'],
      'BBC NEWS': ['08:00 World News', '09:00 Business', '10:00 Live'],
      'FILM CAFE': ['08:00 Film 1', '10:00 Film 2', '12:00 Film 3']
    };

    const els = {
      grid: document.getElementById('channelGrid'),
      frame: document.getElementById('playerFrame'),
      title: document.getElementById('playerTitle'),
      meta: document.getElementById('playerMeta'),
      guideList: document.getElementById('guideList'),
      goToStream: document.getElementById('goToStream'),
      goToProgram: document.getElementById('goToProgram'),
      fullscreenBtn: document.getElementById('fullscreenBtn'),
      playerPanel: document.getElementById('playerPanel'),
      tvGuide: document.getElementById('tvGuide'),
      playerWrap: document.getElementById('playerWrap')
    };

    function renderGuide(name){
      const rows = (program[name] || ['N/A']).map(s=>{
        const [t,...rest]=s.split(' ');
        return `<div class="row"><div class="time">${t}</div><div class="show">${rest.join(' ')}</div></div>`;
      });
      els.guideList.innerHTML = rows.join('');
    }

    function openStream(ch){
      els.title.textContent = ch.name;
      els.meta.textContent = ch.category;
      els.frame.src = ch.embed;
      renderGuide(ch.name);
      els.playerPanel.scrollIntoView({behavior:'smooth', block:'start'});
    }

    function renderChannels(){
      els.grid.innerHTML = channels.map(c=>`
        <article class="card">
          <div class="title">${c.name}</div>
          <button class="open" data-name="${c.name}" type="button">▶ Deschide</button>
        </article>
      `).join('');
      els.grid.querySelectorAll('.open').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const ch = channels.find(c=>c.name===btn.dataset.name);
          if(ch) openStream(ch);
        });
      });
    }

    els.goToStream.addEventListener('click', ()=>els.playerPanel.scrollIntoView({behavior:'smooth'}));
    els.goToProgram.addEventListener('click', ()=>els.tvGuide.scrollIntoView({behavior:'smooth'}));

    els.fullscreenBtn.addEventListener('click', async ()=>{
      try{
        if(!document.fullscreenElement){
          await els.playerWrap.requestFullscreen();
        }else{
          await document.exitFullscreen();
        }
      }catch(e){
        alert('Fullscreen blocat de browser pentru acest preview.');
      }
    });

    renderChannels();
    renderGuide('PROTV HD');
  </script>
</body>
</html>
