<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Quick Grid - Fullscreen Fixed</title>
  <style>
    :root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 14px; padding-bottom: 28px; }
    .panel { background:linear-gradient(180deg, rgba(22,28,44,.92), rgba(14,18,30,.95)); border:1px solid var(--border); border-radius:14px; padding:12px; }
    
    /* Stil pentru butonul de Fullscreen */
    .fs-trigger {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
      transition: opacity 0.2s;
    }
    .fs-trigger:hover { opacity: 0.8; }

    .player {
      width: min(860px, calc(100vw - 24px));
      margin: 0 auto 10px;
      background:rgba(10,14,24,.95);
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      position: relative;
    }
    .player-head { display:flex; justify-content:space-between; gap:10px; align-items:center; padding:8px 10px; }
    
    .player-wrap {
      position:relative;
      border-top:1px solid var(--border);
      background:#000;
      aspect-ratio:16/9;
      width: 100%;
    }
    .player-frame { width:100%; height:100%; border:0; display: block; }

    /* Restul stilurilor tale originale */
    .controls { display:grid; grid-template-columns:1fr 220px auto; gap:8px; margin-top:10px; }
    input, select, button { border:1px solid var(--border); border-radius:10px; background:#0f1322; color:var(--text); padding:10px; }
    .grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; margin-top:20px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; cursor:pointer; text-align:center; }
    .card.active { border-color:var(--accent); background: rgba(111, 140, 255, 0.1); }
    
    @media (max-width:900px) { .grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media (max-width:500px) { .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } .controls { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="wrap">
  <section class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 style="margin:0; font-size:1.2rem;">IPTV Quick Grid</h1>
        <span id="appVersion" style="font-size:0.7rem; color:var(--muted);"></span>
    </div>
    <div class="controls">
      <input id="searchInput" placeholder="Caută post..." />
      <select id="categorySelect"><option value="all">Toate categoriile</option></select>
      <button id="showFav">★ Favorite</button>
    </div>
  </section>

  <section class="player" id="mainPlayer">
    <div class="player-head">
      <strong id="playerTitle">Selectează un canal</strong>
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="fs-trigger" onclick="toggleFullScreen()">ECRAN COMPLET</button>
        <button id="prevFavBtn">CH-</button>
        <button id="nextFavBtn">CH+</button>
      </div>
    </div>
    <div class="player-wrap" id="pWrap">
      <iframe id="playerFrame" class="player-frame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
  </section>

  <div class="grid" id="channelGrid"></div>
</div>

<script>
    // AICI ADAUGI TOATE CANALELE TALE (am pus cateva ca exemplu, pune-le pe toate cele 50+)
    const channels = [
        {name:'PROTV HD',embed:'https://canale-tv.com/channel/pr0tv.html',category:'General'},
        {name:'ANTENA 1',embed:'https://canale-tv.com/channel/a1.html',category:'General'},
        {name:'HBO HD',embed:'https://canale-tv.com/channel/hb.html',category:'Filme'},
        {name:'DIGI SPORT 1',embed:'https://canale-tv.com/channel/dgsp1.html',category:'Sport'},
        {name:'EUROSPORT',embed:'https://canale-tv.com/channel/eurosport1.html',category:'Sport'},
        {name:'KANAL D',embed:'https://canale-tv.com/channel/kanald.html',category:'General'}
        // ... adauga restul aici
    ];

    let currentChannel = null;
    let searchTerm = '';
    let categoryFilter = 'all';

    function toggleFullScreen() {
        const playerElem = document.getElementById('mainPlayer');
        if (!document.fullscreenElement) {
            if (playerElem.requestFullscreen) playerElem.requestFullscreen();
            else if (playerElem.webkitRequestFullscreen) playerElem.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    function openStream(c) {
        currentChannel = c.name;
        document.getElementById('playerTitle').textContent = c.name;
        document.getElementById('playerFrame').src = c.embed;
        render();
    }

    function render() {
        const grid = document.getElementById('channelGrid');
        grid.innerHTML = '';
        
        const filtered = channels.filter(c => 
            (categoryFilter === 'all' || c.category === categoryFilter) &&
            (c.name.toLowerCase().includes(searchTerm.toLowerCase()))
        );

        filtered.forEach(c => {
            const card = document.createElement('div');
            card.className = `card ${currentChannel === c.name ? 'active' : ''}`;
            card.innerHTML = `<strong>${c.name}</strong><br><small style="color:var(--muted)">${c.category}</small>`;
            card.onclick = () => openStream(c);
            grid.appendChild(card);
        });
    }

    // Dublu click pe video pentru FS
    document.getElementById('pWrap').ondblclick = toggleFullScreen;

    // Filtre
    document.getElementById('searchInput').oninput = (e) => { searchTerm = e.target.value; render(); };
    document.getElementById('categorySelect').onchange = (e) => { categoryFilter = e.target.value; render(); };

    // Init categorii
    const cats = ['all', ...new Set(channels.map(c => c.category))];
    const sel = document.getElementById('categorySelect');
    sel.innerHTML = '';
    cats.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        sel.appendChild(opt);
    });

    render();
</script>
</body>
</html>
