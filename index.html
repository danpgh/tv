<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Quick Grid - Preview Mode</title>
  <style>
    :root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 14px; padding-bottom: 28px; }
    .panel { background:linear-gradient(180deg, rgba(22,28,44,.92), rgba(14,18,30,.95)); border:1px solid var(--border); border-radius:14px; padding:12px; }
    h1 { margin:0 0 6px; font-size:1.15rem; }
    .hint { margin:0; color:var(--muted); font-size:.9rem; }
    .top { display:grid; gap:10px; margin-bottom:12px; }
    .controls { display:grid; grid-template-columns:1fr 220px auto; gap:8px; }
    input,select { width:100%; border:1px solid var(--border); border-radius:10px; background:#0f1322; color:var(--text); padding:10px 12px; outline:none; }
    button { border:1px solid var(--border); border-radius:8px; background:#131a2d; color:var(--text); padding:5px 7px; font-size:.76rem; cursor:pointer; }
    button.active { border-color:var(--accent); color:#dce4ff; }
    
    /* STILURI PROGRAM TV (Font Mărit) */
    .tv-guide { width: min(640px, calc(100vw - 24px)); margin: 0 auto 12px; background: rgba(10,14,24,.95); border: 1px solid var(--border); border-radius: 12px; padding: 12px; box-shadow: 0 12px 22px rgba(0,0,0,.35); }
    .guide-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .guide-title { font-size: 1rem; color: #c9d3f7; margin:0; }
    .guide-list { max-height: 300px; overflow-y: auto; }
    .guide-row { display: grid; grid-template-columns: 70px 1fr; gap: 12px; font-size: 0.95rem; margin-bottom: 8px; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .guide-time { color: var(--accent); font-weight: 600; }
    .guide-show { color: #e1e8ff; line-height:1.4; }

    /* STILURI PLAYER */
    .player { width: min(640px, calc(100vw - 24px)); margin: 0 auto 10px; background:rgba(10,14,24,.95); border:1px solid var(--border); border-radius:12px; overflow:hidden; box-shadow:0 14px 30px rgba(0,0,0,.45); }
    .player-wrap { border-top:1px solid var(--border); background:#000; aspect-ratio:16/9; }
    .player-frame { width:100%; height:100%; border:0; }
    
    .grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:10px; cursor:pointer; transition: transform 0.2s; }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .card.active { border-color:var(--accent); background: rgba(111,140,255,0.05); }
    .title { font-size:.85rem; margin:0 0 4px; }
    .badge { font-size:.65rem; background:#222c49; padding:2px 8px; border-radius:10px; }
    
    @media (max-width:1160px) { .grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media (max-width:680px) { .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:430px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel top">
      <h1>IPTV Quick Grid <span id="appVersion" style="font-size: 0.7rem; opacity: 0.5;"></span></h1>
      <div class="controls">
        <input id="searchInput" placeholder="Caută canal..." />
        <select id="categorySelect"><option value="all">Toate categoriile</option></select>
        <button id="showFavorites">★ Favorite</button>
      </div>
    </section>

    <section class="player" id="playerPanel">
      <div style="padding:10px; display:flex; justify-content:space-between; align-items:center;">
        <h2 id="playerTitle" style="margin:0; font-size:0.9rem;">Selectează un canal</h2>
        <div id="playerMeta" style="font-size:0.7rem; color:var(--muted);">Preview Automant</div>
      </div>
      <div class="player-wrap">
        <iframe id="playerFrame" class="player-frame" allow="autoplay; fullscreen" src="about:blank"></iframe>
      </div>
      <div id="playerFallback" style="padding:8px; font-size:0.7rem; text-align:center; border-top:1px solid var(--border);">
        <a id="openExternalStream" href="#" target="_blank" style="color:var(--accent); text-decoration:none;">Deschide Link Direct ↗</a>
      </div>
    </section>

    <section class="tv-guide" id="tvGuide">
      <div class="guide-head">
        <h3 class="guide-title">Program TV</h3>
        <span class="guide-badge" id="guideStatus">Aștept selecție</span>
      </div>
      <div class="guide-list" id="guideList"></div>
    </section>

    <section class="grid" id="channelGrid"></section>
  </div>

  <script>
    // Configurație și Date (Păstrate din originalul tău)
    const APP_VERSION = '2026-03-27.4';
    const FALLBACK_STREAM_HOST = '95.215.19.22';
    const FALLBACK_STREAM_PROTOCOL = 'http:';
    
    // Lista canale (Exemplu scurtat pentru demo, păstrează-le pe ale tale în fișierul final)
    const channels = [
      {name:'PROTV HD',embed:'https://canale-tv.com/channel/pr0tv.html',category:'General',description:'Stiri si divertisment.'},
      {name:'A1 HD',embed:'https://canale-tv.com/channel/a1.html',category:'General',description:'Antena 1 HD.'},
      {name:'HB0',embed:'https://canale-tv.com/channel/hb.html',category:'Movies',description:'Filme premium.'},
      {name:'DIGI SPORT 1',embed:'https://canale-tv.com/channel/dgsp1.html',category:'Sports',description:'Sport live.'},
      // ... restul canalelor tale vor funcționa la fel
    ];

    const appState = {
      playing: null,
      search: '',
      category: 'all',
      favoritesOnly: false,
      favorites: new Set(JSON.parse(localStorage.getItem('iptv-favorites') || '[]'))
    };

    const els = {
      grid: document.getElementById('channelGrid'),
      search: document.getElementById('searchInput'),
      category: document.getElementById('categorySelect'),
      showFav: document.getElementById('showFavorites'),
      playerFrame: document.getElementById('playerFrame'),
      playerTitle: document.getElementById('playerTitle'),
      playerMeta: document.getElementById('playerMeta'),
      guideList: document.getElementById('guideList'),
      guideStatus: document.getElementById('guideStatus'),
      openExternalStream: document.getElementById('openExternalStream')
    };

    // Funcția care face PLAY în fereastra de PREVIEW
    function openStream(channel) {
      appState.playing = channel.name;
      els.playerTitle.textContent = channel.name;
      els.playerMeta.textContent = `${channel.category} • Incarcare...`;
      
      // Construim URL-ul folosind host-ul de fallback pentru a evita blocajele de iframe
      const streamUrl = new URL(channel.embed);
      streamUrl.protocol = FALLBACK_STREAM_PROTOCOL;
      streamUrl.hostname = FALLBACK_STREAM_HOST;
      
      // Încarcă în iframe-ul de preview
      els.playerFrame.src = streamUrl.toString();
      els.openExternalStream.href = channel.embed;
      
      // Update EPG (Simulat pentru demo)
      updateGuide(channel);
      render();
    }

    function toggleFavorite(name) {
      appState.favorites.has(name) ? appState.favorites.delete(name) : appState.favorites.add(name);
      localStorage.setItem('iptv-favorites', JSON.stringify([...appState.favorites]));
      render();
    }

    function updateGuide(channel) {
      if(!channel) return;
      els.guideStatus.textContent = `Actualizat: ${new Date().toLocaleTimeString()}`;
      // Aici poți insera logica ta de fetchProgramTvForChannel
      els.guideList.innerHTML = `
        <div class="guide-row"><span class="guide-time">Acum</span><span class="guide-show">Emisiune în curs pe ${channel.name}</span></div>
        <div class="guide-row"><span class="guide-time">Urmează</span><span class="guide-show">Programul următor (Date din sursă)</span></div>
      `;
    }

    function render() {
      const q = appState.search.toLowerCase();
      const filtered = channels
        .filter(c => appState.category === 'all' || c.category === appState.category)
        .filter(c => c.name.toLowerCase().includes(q))
        .filter(c => !appState.favoritesOnly || appState.favorites.has(c.name));

      els.grid.innerHTML = '';
      filtered.forEach(c => {
        const card = document.createElement('div');
        card.className = `card ${appState.playing === c.name ? 'active' : ''}`;
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between;">
            <h3 class="title">${c.name}</h3>
            <span class="badge">${c.category}</span>
          </div>
          <p style="font-size:0.7rem; color:var(--muted); margin:4px 0;">${c.description}</p>
          <div style="display:flex; gap:5px; margin-top:8px;">
            <button style="flex:1; background:var(--accent); color:white; border:none;">PLAY</button>
            <button class="fav-btn" style="width:30px;">${appState.favorites.has(c.name) ? '★' : '☆'}</button>
          </div>
        `;
        card.onclick = () => openStream(c);
        card.querySelector('.fav-btn').onclick = (e) => { e.stopPropagation(); toggleFavorite(c.name); };
        els.grid.append(card);
      });
    }

    // Init
    els.search.oninput = (e) => { appState.search = e.target.value; render(); };
    els.category.onchange = (e) => { appState.category = e.target.value; render(); };
    els.showFav.onclick = () => { appState.favoritesOnly = !appState.favoritesOnly; els.showFav.classList.toggle('active'); render(); };
    
    document.getElementById('appVersion').textContent = `v${APP_VERSION}`;
    render();
  </script>
</body>
</html>
