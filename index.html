<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Quick Grid - Fixed Preview</title>
  <style>
    :root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 14px; padding-bottom: 28px; }
    .panel { background:linear-gradient(180deg, rgba(22,28,44,.92), rgba(14,18,30,.95)); border:1px solid var(--border); border-radius:14px; padding:12px; }
    
    /* MODIFICARE: FONT MARE PROGRAM TV */
    .tv-guide { width: min(800px, calc(100vw - 24px)); margin: 20px auto; background: rgba(10,14,24,.95); border: 2px solid var(--accent); border-radius: 12px; padding: 15px; }
    .guide-title { font-size: 1.4rem; color: #fff; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .guide-list { max-height: 400px; overflow-y: auto; }
    .guide-row { display: grid; grid-template-columns: 100px 1fr; gap: 15px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .guide-time { color: var(--accent); font-size: 1.1rem; font-weight: bold; }
    .guide-show { color: #fff; font-size: 1.1rem; line-height: 1.4; font-weight: 500; }

    /* PLAYER PREVIEW */
    .player { width: min(800px, calc(100vw - 24px)); margin: 0 auto 20px; background:#000; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .player-wrap { aspect-ratio: 16/9; position: relative; background: #000; }
    iframe { width: 100%; height: 100%; border: none; }
    
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:15px; margin-top: 20px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:15px; cursor:pointer; }
    .card.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(111,140,255,0.3); }
    .title { font-size: 1rem; margin: 0; color: var(--accent); }
    button { cursor: pointer; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: #1a2035; color: white; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>IPTV Preview Mode <span id="appVer" style="font-size:0.6rem; opacity:0.5;"></span></h1>
      <input id="searchInput" placeholder="Caută canal..." style="width:100%; padding:12px; border-radius:8px; background:#0f1322; color:white; border:1px solid var(--border);">
    </section>

    <section class="player">
      <div style="padding:10px; background: #111522; font-weight: bold;" id="pTitle">Selectează un canal</div>
      <div class="player-wrap">
        <iframe id="mainFrame" allow="autoplay; fullscreen" src="about:blank"></iframe>
      </div>
    </section>

    <section class="tv-guide">
      <div class="guide-title">📺 Program TV: <span id="curChannel" style="color:var(--accent)">-</span></div>
      <div id="gList" class="guide-list">
        <div style="color:var(--muted); padding:20px;">Apasă pe un canal pentru a vedea programul...</div>
      </div>
    </section>

    <div id="cGrid" class="grid"></div>
  </div>

  <script>
    const APP_VERSION = '2026-04-01.1';
    const FALLBACK_HOST = '95.215.19.22';
    const PROTOCOL = 'http:';

    // Folosim canalele tale din context
    const channels = [
      {name:'PROTV HD',embed:'https://canale-tv.com/channel/pr0tv.html',category:'General'},
      {name:'A1 HD',embed:'https://canale-tv.com/channel/a1.html',category:'General'},
      {name:'DIGI SPORT 1',embed:'https://canale-tv.com/channel/dgsp1.html',category:'Sports'},
      {name:'FILM CAFE',embed:'https://canale-tv.com/channel/filmcafe.html',category:'Movies'},
      {name:'HB0',embed:'https://canale-tv.com/channel/hb.html',category:'Movies'}
    ];

    function openChannel(c) {
      document.getElementById('pTitle').textContent = `Redare: ${c.name}`;
      document.getElementById('curChannel').textContent = c.name;
      
      // CONSTRUCȚIE URL PENTRU PREVIEW (Ocolim restricțiile iframe)
      const url = new URL(c.embed);
      url.protocol = PROTOCOL;
      url.hostname = FALLBACK_HOST;
      
      const frame = document.getElementById('mainFrame');
      frame.src = url.toString();

      // AFISARE PROGRAM TV (Fontul este marit din CSS)
      const gList = document.getElementById('gList');
      gList.innerHTML = `
        <div class="guide-row"><span class="guide-time">ACUM</span><span class="guide-show">Se încarcă datele live pentru ${c.name}...</span></div>
        <div class="guide-row"><span class="guide-time">14:00</span><span class="guide-show">Emisiune Informativă</span></div>
        <div class="guide-row"><span class="guide-time">16:30</span><span class="guide-show">Film / Serial de după-amiază</span></div>
      `;
      
      render(c.name);
    }

    function render(activeName = '') {
      const container = document.getElementById('cGrid');
      const search = document.getElementById('searchInput').value.toLowerCase();
      container.innerHTML = '';
      
      channels.filter(c => c.name.toLowerCase().includes(search)).forEach(c => {
        const div = document.createElement('div');
        div.className = `card ${c.name === activeName ? 'active' : ''}`;
        div.innerHTML = `<div class="title">${c.name}</div><div style="font-size:0.7rem; color:var(--muted)">${c.category}</div>`;
        div.onclick = () => openChannel(c);
        container.appendChild(div);
      });
    }

    document.getElementById('searchInput').oninput = () => render();
    document.getElementById('appVer').textContent = APP_VERSION;
    render();
  </script>
</body>
</html>
