<!doctype html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV Quick Grid - Fullscreen Fix</title>
  <style>
    :root { --bg:#090b12; --panel:#111522; --border:#27304a; --text:#ebefff; --muted:#98a3c7; --accent:#6f8cff; --fav:#ffd166; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:radial-gradient(circle at top right,#1c2548 0%,#0e1220 42%,var(--bg) 100%); color:var(--text); min-height:100vh; }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 14px; }
    
    .player {
      width: min(1000px, 100%);
      margin: 0 auto 20px;
      background:#000;
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      position: relative;
    }

    /* Zona de butoane deasupra playerului */
    .player-head { 
        display:flex; 
        justify-content:space-between; 
        align-items:center; 
        padding:10px; 
        background: var(--panel);
    }
    
    .player-wrap {
      position:relative;
      width: 100%;
      aspect-ratio:16/9;
      background:#000;
    }

    /* Iframe-ul trebuie sa ignore click-urile pentru dublu-click-ul nostru, 
       dar avem nevoie de ele pentru controalele lui interne. 
       Am optimizat aici: */
    .player-frame { 
      width:100%; 
      height:100%; 
      border:0; 
    }

    /* Buton special de Fullscreen */
    .fs-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:15px; cursor:pointer; text-align:center; }
    .card:hover { border-color: var(--accent); }
    .card.active { background: var(--accent); color: #000; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="player" id="mainPlayer">
    <div class="player-head">
      <strong id="pTitle">Selectează un canal</strong>
      <button class="fs-btn" onclick="toggleFS()">Ecran Complet [ ]</button>
    </div>
    <div class="player-wrap" id="pWrap">
      <iframe id="playerFrame" class="player-frame" 
              allow="autoplay; fullscreen" 
              allowfullscreen="true"></iframe>
    </div>
  </div>

  <div class="grid" id="channelGrid"></div>
</div>

<script>
const channels = [
  {name:'PROTV HD',embed:'https://canale-tv.com/channel/pr0tv.html'},
  {name:'ANTENA 1',embed:'https://canale-tv.com/channel/a1.html'},
  {name:'DIGI SPORT 1',embed:'https://canale-tv.com/channel/dgsp1.html'},
  {name:'HBO HD',embed:'https://canale-tv.com/channel/hb.html'}
];

function openStream(c) {
  document.getElementById('pTitle').textContent = c.name;
  document.getElementById('playerFrame').src = c.embed;
  
  // Marcam cardul activ
  document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

// FUNCȚIE PENTRU FULLSCREEN FORȚAT
function toggleFS() {
  const elem = document.getElementById('mainPlayer'); // Mărește tot playerul, inclusiv titlul
  if (!document.fullscreenElement) {
    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) { /* Safari */
      elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) { /* IE11 */
      elem.msRequestFullscreen();
    }
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  }
}

// Dublu click pe zona playerului pentru Fullscreen
document.getElementById('pWrap').ondblclick = toggleFS;

// Generare Grid
const grid = document.getElementById('channelGrid');
channels.forEach(c => {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `<strong>${c.name}</strong>`;
  div.onclick = () => openStream(c);
  grid.appendChild(div);
});
</script>

</body>
</html>
